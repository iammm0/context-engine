services:
  # MongoDB 数据库服务（本地开发）
  mongodb:
    image: mongo:7.0
    container_name: context-engine-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: advanced_rag
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - context-engine-dev-network
    healthcheck:
      # mongosh 冷启动较慢，需足够 timeout；使用 --eval 比管道更快
      test: ["CMD", "mongosh", "localhost:27017/test", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s

  # Qdrant 向量数据库服务（本地开发）
  qdrant:
    image: qdrant/qdrant:latest
    container_name: context-engine-qdrant-dev
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - context-engine-dev-network

  # Neo4j 图数据库服务（本地开发）
  neo4j:
    image: neo4j:5.15.0
    container_name: context-engine-neo4j-dev
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'  # 启用 APOC 插件
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - context-engine-dev-network

  # Redis 缓存服务（本地开发，可选）
  redis:
    image: redis:7
    container_name: context-engine-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - context-engine-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  qdrant_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  neo4j_plugins:
    driver: local
  redis_data:
    driver: local

networks:
  context-engine-dev-network:
    driver: bridge
